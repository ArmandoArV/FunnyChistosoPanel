name: Deploy Backend to Azure VM

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Build Linux binary
        run: |
          cd backend
          GOWORK=off CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o c2server-linux .

      - name: Copy binary to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "backend/c2server-linux"
          target: "/home/${{ secrets.VM_USER }}/FunnyChistosoPanel/backend/"
          strip_components: 1

      - name: Write .env to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            printf 'DB_HOST=%s\nDB_PORT=5432\nDB_USER=%s\nDB_PASSWORD=%s\nDB_NAME=%s\nC2_PORT=:4444\nAPI_PORT=:8080\nJWT_SECRET=%s\nDISCORD_WEBHOOK_URL=%s\nSCREENSHOT_STORAGE_PATH=./screenshots\nSCREENSHOT_BASE_URL=%s\n' \
              '${{ secrets.DB_HOST }}' \
              '${{ secrets.DB_USER }}' \
              '${{ secrets.DB_PASSWORD }}' \
              '${{ secrets.DB_NAME }}' \
              '${{ secrets.JWT_SECRET }}' \
              '${{ secrets.DISCORD_WEBHOOK_URL }}' \
              '${{ secrets.SCREENSHOT_BASE_URL }}' \
              > ~/FunnyChistosoPanel/backend/.env
            echo "[✓] .env written"
            cat ~/FunnyChistosoPanel/backend/.env | grep -v PASSWORD | grep -v SECRET | grep -v WEBHOOK

      - name: Restart service on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/FunnyChistosoPanel/backend
            chmod +x c2server-linux
            pkill -f c2server-linux || true
            sleep 1
            nohup ./c2server-linux > ~/c2server.log 2>&1 &
            sleep 4
            tail -30 ~/c2server.log
